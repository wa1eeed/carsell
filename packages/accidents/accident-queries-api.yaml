components:
  schemas:
    AccidentSub:
      type: object
      properties:
        accidentNumber:
          type: integer
          format: int64
          x-faker: datatype.number
          default: null
        accidentDate:
          type: string
          x-faker: lorem.words
          default: null
      default: null
    DrivingLicenseDetails:
      type: object
      properties:
        issueDate:
          type: integer
          format: int32
          x-faker: datatype.number
          default: null
        expiryDate:
          type: integer
          format: int32
          x-faker: datatype.number
          default: null
        type:
          $ref: "#/components/schemas/ObjectData"
        status:
          $ref: "#/components/schemas/ObjectData"
        objectStatus:
          $ref: "#/components/schemas/ObjectData"
        objectType:
          $ref: "#/components/schemas/ObjectData"
      default: null
    ObjectData:
      type: object
      properties:
        code:
          type: integer
          format: int32
          x-faker: datatype.number
          default: null
        descAr:
          type: string
          x-faker: lorem.words
          default: null
        descEn:
          type: string
          x-faker: lorem.words
          default: null
      default: null
    PersonDrivingLicense:
      type: object
      properties:
        bloodTypeCode:
          type: integer
          format: int32
          x-faker: datatype.number
          default: null
        bloodTypeDesc:
          type: string
          x-faker: lorem.words
          default: null
        id:
          type: integer
          format: int64
          x-faker: datatype.number
          default: null
        listOfDrivingLicenses:
          type: array
          items:
            $ref: "#/components/schemas/DrivingLicenseDetails"
          default: null
      default: null
    AccidentAttachment:
      type: object
      properties:
        fileName:
          type: string
          x-faker: lorem.words
          default: null
        fileDesc:
          type: string
          x-faker: lorem.words
          default: null
      default: null
    AccidentInfo:
      type: object
      properties:
        accidentNumber:
          type: integer
          format: int64
          x-faker: datatype.number
          default: null
        accidentDate:
          type: integer
          format: int32
          x-faker: datatype.number
          default: null
        accidentTime:
          type: string
          x-faker: lorem.words
          default: null
        trafficBranchName:
          type: string
          x-faker: lorem.words
          default: null
        accidentCause:
          type: string
          x-faker: lorem.words
          default: null
        accidentType:
          type: string
          x-faker: lorem.words
          default: null
        accidentCity:
          type: string
          x-faker: lorem.words
          default: null
        streetName:
          type: string
          x-faker: lorem.words
          default: null
        longitude:
          type: string
          x-faker: lorem.words
          default: null
        latitude:
          type: string
          x-faker: lorem.words
          default: null
        accidentDescription:
          type: string
          x-faker: lorem.words
          default: null
        trafficDirection:
          type: string
          x-faker: lorem.words
          default: null
        weatherCondition:
          type: string
          x-faker: lorem.words
          default: null
        residentialZone:
          type: string
          x-faker: lorem.words
          default: null
        lightingCondition:
          type: string
          x-faker: lorem.words
          default: null
        roadServiceCondition:
          type: string
          x-faker: lorem.words
          default: null
        roadType:
          type: string
          x-faker: lorem.words
          default: null
        privateDamages:
          type: string
          x-faker: lorem.words
          default: null
        publicDamages:
          type: string
          x-faker: lorem.words
          default: null
        officerName:
          type: string
          x-faker: lorem.words
          default: null
        numberOfPartiesInvolved:
          type: integer
          format: int32
          x-faker: datatype.number
          default: null
        numberOfInjuredPersons:
          type: integer
          format: int32
          x-faker: datatype.number
          default: null
        imagesTokens:
          type: array
