        - name: app_key
          in: header
          required: true
          style: simple
          explode: false
          schema:
            type: string
            default: null
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: object
                default: null
  /api/v1/accidents-by-person/{personId}/{noOfYears}:
    get:
      tags:
        - accident-controller
      operationId: getPersonAccidentsForLezam
      parameters:
        - name: Operator-ID
