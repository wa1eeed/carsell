          required: true
          style: simple
          explode: false
          schema:
            type: string
            default: null
        - name: app_key
          in: header
          required: true
          style: simple
          explode: false
          schema:
            type: string
            default: null
      responses:
        "200":
          description: OK
          content:
            "*/*":
