            type: string
            x-faker: lorem.words
            default: null
          default: null
        involvedPersons:
          type: array
          items:
            $ref: "#/components/schemas/AccidentPerson"
          default: null
        involvedVehicles:
          type: array
          items:
            $ref: "#/components/schemas/AccidentVehicle"
          default: null
        files:
          type: array
          items:
            $ref: "#/components/schemas/AccidentAttachment"
          default: null
      default: null
    AccidentPerson:
