      properties:
        nationalId:
          type: string
          x-faker: lorem.words
          default: null
        firstName:
          type: string
          x-faker: lorem.words
          default: null
        fatherName:
          type: string
          x-faker: lorem.words
          default: null
        grandFatherName:
          type: string
          x-faker: lorem.words
          default: null
        familyName:
          type: string
          x-faker: lorem.words
          default: null
        gender:
          type: string
          enum:
            - UNKNOWN
            - MALE
            - FEMALE
          default: null
        nationality:
          type: string
          x-faker: lorem.words
          default: null
        involvementType:
          type: string
          x-faker: lorem.words
          default: null
        responsibilityPercentage:
          type: integer
          format: int32
          x-faker: datatype.number
          default: null
        mobileNumber:
          type: string
          x-faker: lorem.words
          default: null
        healthStatus:
          type: string
          x-faker: lorem.words
          default: null
        hospitalName:
          type: string
          x-faker: lorem.words
          default: null
        objected:
          type: boolean
          x-faker: datatype.boolean
          default: null
        involvementSequence:
          type: integer
          format: int32
          x-faker: datatype.number
          default: null
        birthDate:
          type: string
          x-faker: lorem.words
          default: null
        drivingLicenseType:
          type: string
          x-faker: lorem.words
          default: null
        licenseExpiryDate:
          type: integer
          format: int32
          x-faker: datatype.number
          default: null
        relatedVehicle:
          type: string
          x-faker: lorem.words
          default: null
        imagesTokens:
          type: array
          items:
            type: string
            x-faker: lorem.words
            default: null
          default: null
        drivingLicense:
          $ref: "#/components/schemas/DrivingLicense"
      default: null
    AccidentVehicle:
      type: object
      properties:
        make:
          type: string
          x-faker: lorem.words
          default: null
        model:
          type: string
          x-faker: lorem.words
          default: null
        modelYear:
          type: string
          x-faker: lorem.words
          default: null
        bodyType:
          type: string
          x-faker: lorem.words
          default: null
        color:
          type: string
          x-faker: lorem.words
          default: null
        oldPlateNumber:
          type: string
          x-faker: lorem.words
          default: null
        plate:
          type: string
          x-faker: lorem.words
          default: null
        registrationType:
          type: string
          x-faker: lorem.words
          default: null
        chassisNumber:
          type: string
          x-faker: lorem.words
          default: null
        licenseExpiryDate:
          type: integer
          format: int32
          x-faker: datatype.number
          default: null
        insuranceCompany:
          type: string
          x-faker: lorem.words
          default: null
        sequenceNumber:
          type: integer
          format: int32
          x-faker: datatype.number
          default: null
        numberOfPreviousOwners:
          type: integer
          format: int32
          x-faker: datatype.number
          default: null
        involvementSequence:
          type: integer
          format: int32
          x-faker: datatype.number
          default: null
        insurancePolicyNumber:
          type: string
          x-faker: lorem.words
          default: null
        insuranceExpiryDate:
          type: integer
          format: int32
          x-faker: datatype.number
          default: null
        ownerId:
          type: string
          x-faker: lorem.words
          default: null
        ownerName:
          type: string
          x-faker: lorem.words
          default: null
        drivingDirection:
          type: string
          x-faker: lorem.words
          default: null
        damageStatus:
          type: string
          x-faker: lorem.words
          default: null
        damagePoint:
          type: string
          x-faker: lorem.words
          default: null
        damageDescription:
          type: string
          x-faker: lorem.words
          default: null
        numberOfPassengers:
          type: integer
          format: int32
          x-faker: datatype.number
          default: null
        imagesTokens:
          type: array
          items:
            type: string
            x-faker: lorem.words
            default: null
          default: null
      default: null
    DrivingLicense:
      type: object
      properties:
        licenseExpiryDate:
          type: integer
          format: int32
          x-faker: datatype.number
          default: null
        licenseType:
          type: string
          x-faker: lorem.words
          default: null
      default: null
    PersonIdsDto:
      required:
