openapi: 3.1.1
info:
  title: Accident Queries API
  description: Accidents Reports
  version: "2.0"
servers:
  - url: mock-service.api.elm.sa/basher
    description: mock server
paths:
  /api/v2/accidents/images:
    get:
      tags:
        - accident-controller
      operationId: getImageByPath
      parameters:
        - name: imagePath
          in: query
          required: true
          style: form
          explode: true
          schema:
            type: string
            default: null
        - name: app_id
          in: header
          required: true
          style: simple
          explode: false
          schema:
            type: string
            default: null
        - name: app_key
          in: header
          required: true
          style: simple
          explode: false
          schema:
            type: string
            default: null
      responses:
        "200":
          description: OK
          content:
            image/png:
              schema:
                type: array
                items:
                  type: string
                  default: null
                  contentEncoding: base64
                  contentMediaType: image/png
                default: null
            application/json:
              schema:
                type: array
                items:
                  type: string
                  default: null
                  contentEncoding: base64
                  contentMediaType: application/json
                default: null
