  /api/v1/accident-reports:
    get:
      tags:
        - accident-controller
      operationId: getAccidentReport
      parameters:
        - name: operator-id
          in: header
          required: true
          style: simple
          explode: false
          schema:
            type: string
            default: null
        - name: client-key
          in: header
          required: true
          style: simple
